# Configuration for residential sector

period_step: 5

model_periods:
  - 2025
  - 2030
  - 2035
  - 2040
  - 2045
  - 2050

demand_commodities:
  'space heating': 'D_R_SPH'
  'space cooling': 'D_R_SPC'
  'lighting': 'D_R_LGT'
  'water heating': 'D_R_WAH'
  'refrigerators': 'D_R_APP_REF'
  'freezers': 'D_R_APP_FRZ'
  'dish washers': 'D_R_APP_DSH'
  'clothes washers': 'D_R_APP_CWSH'
  'clothes dryers': 'D_R_APP_CDRY'
  'cooking ranges': 'D_R_APP_COOK_RNG'
  'other appliances': 'D_R_APP_OTH'

nrcan_url: "https://oee.nrcan.gc.ca/corporate/statistics/neud/dpa/data_e/downloads/comprehensive/Excel/<y>/res_<r>_e_<t>.xls"
nrcan_reference: Comprehensive Energy Use Database. Government of Canada, Natural Resources Canada. (2020) https://oee.nrcan.gc.ca/corporate/statistics/neud/dpa/menus/trends/comprehensive_tables/list.cfm
nrcan_data_year: 2020

aeo_reference: 'EIA. (2023). Updated Buildings Sector Appliance and Equipment Costs and Efficiency—Reference case [dataset]. https://www.eia.gov/analysis/studies/buildings/equipcosts/'
aeo_data_year: 2023

aeo_currency_year: 2022
aeo_currency: 'USD'

statcan_reference: "Statistics Canada, (2022, August 22). Projected population, by projection scenario, age and sex, as of July 1. https://www150.statcan.gc.ca/t1/tbl1/en/cv.action?pid=1710005701"
statcan_data_year: 2022

epa_reference: "US EPA. (2023, March). GHG Emission Factors Hub [Overviews and Factsheets]. https://www.epa.gov/climateleadership/ghg-emission-factors-hub"
epa_year: 2023
emissions_commodity: 'CO2eq'
emission_activity_units: 'ktCO2eq/PJ'

conversion_factors:
  epa_units:
    'CO2': 0.948 # kg/MMBtu to kt/PJ
    'CH4': 0.000948 # g/MMBtu to kt/PJ
    'N2O': 0.000948 # g/MMBtu to kt/PJ
  gwp:
    'CO2': 1 # to CO2eq 100y GWP
    'CH4': 25 # to CO2eq 100y GWP
    'N2O': 298 # to CO2eq 100y GWP
  efficiency:
    'EER': 0.293 # kBtu/kWh to PJ/PJ
  lighting:
    'efficacy': 0.0317 # lm/W to Glmy/PJ
    'lifetime': 1.142E-4 # hours to days

# Arbitrary large such that peak demand is satisfied
c2a:
  'space heating': 2000 # Must be same as space cooling as c2a isn't indexed by end use and heat pumps do both
  'space cooling': 2000 # Must be same as space heating as c2a isn't indexed by end use and heat pumps do both
  'water heating': 2000 # LPG instant water heater close to 2000
  'lighting': 1 # Glmy/Glmy

# From a California residential survey ~1.5h/day.
lighting_acf: 0.0625

# Categorising NRCan housing stocks
housing_categories:
  single_family: "Single Detached+Single Attached+Mobile Homes"
  multi_family: "Apartments"